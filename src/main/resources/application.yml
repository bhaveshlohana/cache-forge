spring:
  application:
    name: cache-forge
server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger

management:
  endpoints:
    web:
      exposure:
        include: prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        cache.simulation.latency: true
      percentiles:
        cache.simulation.latency: 0.5, 0.95, 0.99
  endpoint:
    prometheus:
      enabled: true

simulation:
  progress:
    percent-step: 5    # send every 5% progress
    count-step: 1000   # OR send every 1000 iterations